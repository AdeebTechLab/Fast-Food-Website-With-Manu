<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Domino Fazilpur | Admin Login</title>
<link rel="icon" href="../assets/images/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="../assets/images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;500;600;700;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  :root { --brand:#f35f2a; --brand-dark:#d44518; --bg:#f7f4f1; --text:#212121; --muted:#6b7280; --border:#e8e2dd; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { min-height:100vh; display:grid; grid-template-columns:minmax(360px,.95fr) minmax(460px,1.05fr); align-items:center; background:var(--bg); font-family:'Catamaran',sans-serif; color:var(--text); overflow-x:hidden; }
  .visual-panel { position:relative; min-height:100vh; display:flex; align-items:flex-end; padding:64px; overflow:hidden; color:#fff; background:#171717 url('../assets/images/Food Images/background-burgers-home-top.jpg') center/cover no-repeat; }
  .visual-panel::before { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(15,15,15,.16),rgba(15,15,15,.94)); }
  .visual-content { position:relative; z-index:1; max-width:520px; }
  .visual-kicker { display:block; margin-bottom:10px; color:var(--brand); font-family:'Dancing Script',cursive; font-size:31px; }
  .visual-content h2 { font-size:clamp(38px,4vw,58px); line-height:1.02; letter-spacing:-1.5px; }
  .visual-content p { max-width:460px; margin-top:18px; color:rgba(255,255,255,.75); font-size:17px; line-height:1.6; }
  .login-panel { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:48px; }
  .card { width:100%; max-width:480px; padding:46px 44px; background:#fff; border:1px solid var(--border); border-radius:24px; box-shadow:0 24px 70px rgba(45,31,23,.1); }
  .logo { display:flex; align-items:center; gap:14px; margin-bottom:30px; }
  .logo-badge { width:78px; height:78px; padding:3px; flex-shrink:0; background:#fff; border:1px solid var(--border); border-radius:17px; box-shadow:0 8px 22px rgba(0,0,0,.08); overflow:hidden; }
  .logo-badge img { width:100%; height:100%; display:block; object-fit:contain; }
  .brand-label { color:var(--brand); font-size:13px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
  h1 { margin-top:2px; font-size:24px; line-height:1.15; }
  .welcome { margin-bottom:8px; font-size:32px; line-height:1.1; }
  .subtitle { margin-bottom:28px; color:var(--muted); font-size:15px; line-height:1.55; }
  .field { margin-bottom:18px; }
  label { display:block; margin-bottom:7px; color:var(--text); font-size:14px; font-weight:700; }
  input { width:100%; height:52px; padding:12px 15px; color:var(--text); background:#fcfbfa; border:1.5px solid var(--border); border-radius:11px; font:15px inherit; transition:border-color .2s,box-shadow .2s,background .2s; }
  input:focus { outline:none; border-color:var(--brand); background:#fff; box-shadow:0 0 0 4px rgba(243,95,42,.11); }
  button { width:100%; height:52px; margin-top:6px; border:0; border-radius:999px; color:#fff; background:var(--brand); font-family:inherit; font-size:15px; font-weight:800; letter-spacing:.4px; cursor:pointer; box-shadow:0 10px 24px rgba(243,95,42,.27); transition:background .2s,transform .2s,box-shadow .2s; }
  button:hover { background:var(--brand-dark); transform:translateY(-2px); box-shadow:0 14px 28px rgba(243,95,42,.32); }
  button:disabled { opacity:.6; cursor:not-allowed; transform:none; }
  .error { display:none; margin-bottom:18px; padding:10px 12px; color:#a8151a; background:#fdecec; border:1px solid #f5c6c6; border-radius:8px; font-size:13.5px; }
  .back-link { display:block; margin-top:22px; color:var(--muted); text-align:center; font-size:14px; text-decoration:none; }
  .back-link:hover { color:var(--brand); }
  @media (max-width:900px) { body{display:block}.visual-panel{min-height:300px;padding:44px 28px}.visual-content h2{font-size:38px}.login-panel{min-height:auto;padding:36px 20px} }
  @media (max-width:520px) { .visual-panel{min-height:240px;padding:30px 20px}.visual-kicker{font-size:25px}.visual-content h2{font-size:31px}.visual-content p{font-size:14px}.card{padding:32px 22px;border-radius:18px} }
</style>
</head>
<body>
  <aside class="visual-panel" aria-hidden="true">
    <div class="visual-content">
      <span class="visual-kicker">Domino Fazilpur</span>
      <h2>Manage every flavour from one place.</h2>
      <p>Keep your menu, prices and food photography fresh with a simple and secure restaurant dashboard.</p>
    </div>
  </aside>

  <main class="login-panel">
    <div class="card">
      <div class="logo">
        <div class="logo-badge"><img src="../assets/images/Domino Fazilpur png logo.png" alt="Domino Fazilpur"></div>
        <div><span class="brand-label">Restaurant portal</span><h1>Domino Fazilpur Admin</h1></div>
      </div>
      <h2 class="welcome">Welcome back</h2>
      <p class="subtitle">Sign in securely to manage your menu, pricing and food photography.</p>
      <div class="error" id="error-box"></div>
      <form id="login-form">
        <div class="field"><label for="username">Username</label><input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your username" required></div>
        <div class="field"><label for="password">Password</label><input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required></div>
        <button type="submit" id="submit-btn">Sign In to Dashboard</button>
      </form>
      <a class="back-link" href="../index.html">&larr; Back to website</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error-box');
    const submitBtn = document.getElementById('submit-btn');
    fetch('/api/session').then(r => r.json()).then(data => { if (data.authenticated) window.location.href = '/admin/index.html'; }).catch(() => {});
    form.addEventListener('submit', async (e) => {
      e.preventDefault(); errorBox.style.display = 'none'; submitBtn.disabled = true; submitBtn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username:document.getElementById('username').value, password:document.getElementById('password').value }) });
        const data = await res.json(); if (!res.ok) throw new Error(data.error || 'Login failed'); window.location.href = '/admin/index.html';
      } catch (err) { errorBox.textContent = err.message; errorBox.style.display = 'block'; submitBtn.disabled = false; submitBtn.textContent = 'Sign In to Dashboard'; }
    });
  </script>
</body>
</html>
