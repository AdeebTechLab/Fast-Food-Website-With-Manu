<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu | Fast Food Restaurant</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;500;600;700;800&family=Dancing+Script:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="menu-page">
    <header>
      <div class="container">
        <a href="index.html#home" id="logo">
          <img src="assets/images/Domino Fazilpur png logo.png" alt="Domino Fazilpur" />
        </a>

        <button class="nav-toggle" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav>
          <ul>
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#hot-deals">Hot Deals</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="index.html#testimonials">Testimonials</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="index.html#order" class="btn">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="menu standalone-menu" id="menu">
        <div class="container">
          <div class="section-title text-center">
            <h2>Our <span class="highlight">Delicious Menu</span></h2>
          </div>

          <div class="menu-categories"></div>
        </div>
      </section>
    </main>

    <button class="back-to-home" onclick="window.location.href='index.html#home'">
      <i class="fas fa-arrow-left" aria-hidden="true"></i>
      Back to Home
    </button>

    <!-- Cart & Modal UI -->
    <style>
      .floating-cart { position: fixed; bottom: 30px; right: 30px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 60, 0, 0.4); z-index: 1000; transition: transform 0.3s ease; }
      .floating-cart:hover { transform: scale(1.1); }
      .cart-badge { position: absolute; top: -5px; right: -5px; background: white; color: var(--primary); font-size: 0.8rem; font-weight: 700; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
      .product-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
      .product-modal-overlay.active { display: flex; }
      .product-modal { background: var(--white); width: 90%; max-width: 500px; border-radius: 12px; padding: 20px; position: relative; max-height: 90vh; overflow-y: auto; }
      .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--text-color); }
      .modal-header { display: flex; gap: 15px; margin-bottom: 20px; }
      .modal-header img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
      .modal-title { font-size: 1.2rem; font-weight: 700; }
      .modal-price { color: var(--primary); font-weight: 600; }
      .modal-section { margin-bottom: 20px; }
      .modal-section h4 { margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px;}
      .variant-option, .addon-option { display: flex; justify-content: space-between; margin-bottom: 8px; }
            .cart-sidebar { position: fixed; top: 0; right: -450px; width: 100%; max-width: 450px; height: 100%; background: #ffffff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 2000; display: flex; flex-direction: column; font-family: 'Catamaran', sans-serif;}
      .cart-sidebar.active { right: 0; }
      .cart-header { padding: 20px; background: #ff6b35; color: white; display: flex; justify-content: space-between; align-items: center; }
      .cart-header h3 { margin: 0; display: flex; align-items: center; gap: 10px; font-size: 1.4rem;}
      .close-cart { cursor: pointer; font-size: 1.5rem; color: white; }
      .cart-items-wrapper { flex: 1; overflow-y: auto; padding: 20px; }
      .cart-item-card { background: white; border: 1px solid #eaeaea; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: flex-start; gap: 15px; }
      .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
      .cart-item-info { flex: 1; }
      .cart-item-title { font-weight: 800; font-size: 1.1rem; text-transform: uppercase; line-height: 1.2; margin-bottom: 5px; color: #333;}
      .cart-item-price { font-weight: 700; color: #666; margin-top: 10px; }
      .cart-qty-ctrl { display: flex; align-items: center; gap: 15px; border: 1px solid #ff6b35; border-radius: 20px; padding: 2px 15px; color: #333; font-weight: bold; width: fit-content; margin-top: 10px;}
      .cart-qty-ctrl button { background: none; border: none; color: #ff6b35; font-size: 1.2rem; cursor: pointer; font-weight: bold; padding: 0;}
      .add-more-btn { width: 100%; border: 1px dashed #ff6b35; color: #ff6b35; background: transparent; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 20px; font-size: 1rem;}
      .popular-section { margin-top: 20px; }
      .popular-section h4 { display: flex; align-items: center; gap: 5px; margin-bottom: 15px; font-size: 1.1rem; color:#222; }
      .popular-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
      .popular-card { min-width: 140px; position: relative; }
      .popular-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
      .popular-card-title { font-weight: 600; font-size: 0.9rem; margin-top: 5px; line-height: 1.2; color: #555; text-transform: uppercase;}
      .popular-card-price { font-weight: 800; color: #222; margin-top: 5px;}
      .popular-add-btn { position: absolute; right: 5px; top: 90px; background: #ff6b35; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; font-size: 1.2rem; line-height: 1;}
      .cart-summary { background: #f8f9fa; padding: 20px; border-radius: 12px; margin: 20px;}
      .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; color: #555; font-weight: 500;}
      .summary-row.total { border-top: 1px solid #ddd; padding-top: 15px; margin-top: 5px; font-weight: 800; color: #222; font-size: 1.2rem;}
      .checkout-section { padding: 0 20px 20px; }
      .checkout-btn { width: 100%; background: #ff6b35; color: white; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1.2rem; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;}
      .checkout-info { text-align: center; font-size: 0.9rem; color: #777; margin-top: 15px; line-height: 1.4;}
      .checkout-info strong { color: #555; }
    </style>

    <div class="floating-cart" id="floatingCart">
      <i class="fa-solid fa-cart-shopping"></i>
      <div class="cart-badge" id="cartBadge">0</div>
    </div>

    <div class="product-modal-overlay" id="productModal">
      <div class="product-modal">
        <div class="close-modal" id="closeModal">&times;</div>
        <div class="modal-header">
          <img id="modalImg" src="" alt="Product">
          <div>
            <div class="modal-title" id="modalTitle">Product Name</div>
            <div class="modal-price" id="modalBasePrice">Rs. 0</div>
          </div>
        </div>
        <div id="variantsContainer" class="modal-section" style="display:none;">
          <h4>Select Size</h4>
          <div id="variantsOptions"></div>
        </div>
        <div id="addonsContainer" class="modal-section" style="display:none;">
          <h4>Add-ons</h4>
          <div id="addonsOptions"></div>
        </div>
        <div class="modal-section" style="display:flex; align-items:center; gap:15px;">
          <h4 style="margin-bottom:0; border:none; padding:0;">Quantity:</h4>
          <div style="display:flex; align-items:center; gap:10px; background:#f5f5f5; border-radius:8px; padding:5px;">
            <button type="button" id="qtyMinus" style="border:none; background:white; width:30px; height:30px; border-radius:5px; cursor:pointer; font-weight:bold;">-</button>
            <span id="modalQty" style="font-weight:bold; min-width:20px; text-align:center;">1</span>
            <button type="button" id="qtyPlus" style="border:none; background:white; width:30px; height:30px; border-radius:5px; cursor:pointer; font-weight:bold;">+</button>
          </div>
        </div>
        <button class="btn" id="confirmAddToCartBtn" style="width:100%;">Add to Cart - <span id="modalTotalPrice"></span></button>
      </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h3>Your Cart</h3>
        <div class="close-cart" id="closeCart">&times;</div>
      </div>
      <div class="cart-items" id="cartItemsList">
        <p>Your cart is empty.</p>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotalValue">Rs. 0.00</span>
        </div>
        <a href="index.html#order" class="btn" id="checkoutBtn" style="width:100%; text-align:center;">Checkout via WhatsApp</a>
      </div>
    </div>

    <script src="assets/js/menu-data.js"></script>
    <script src="assets/js/script.js"></script>
  
    <!-- Checkout Modal -->
    <div class="checkout-modal-overlay" id="checkoutModal">
      <div class="checkout-modal">
        <div class="checkout-modal-header">
          <h3>Almost there! 🎉</h3>
          <button class="checkout-modal-close" id="closeCheckoutModal">&times;</button>
        </div>
        <div class="checkout-modal-body">
          <div>
            <span class="order-type-label">Order Type</span>
            <div class="order-type-grid">
              <button class="order-type-btn" data-type="Delivery">Delivery</button>
              <button class="order-type-btn" data-type="Pick-Up">Pick-Up</button>
              <button class="order-type-btn" data-type="Car Hop">Car Hop</button>
              <button class="order-type-btn active" data-type="Dine-In">Dine-In</button>
            </div>
          </div>
          <div class="checkout-input-group">
            <label for="checkoutName">Full Name</label>
            <input type="text" id="checkoutName" placeholder="e.g. Salman Adeeb Yasin" />
          </div>
          <div class="checkout-input-group">
            <label for="checkoutPhone">Phone Number</label>
            <input type="tel" id="checkoutPhone" placeholder="e.g. 0312534546" />
          </div>
          <div class="checkout-input-group" id="tableNumberGroup">
            <label for="checkoutTable">Table Number</label>
            <input type="text" id="checkoutTable" placeholder="e.g. 12" />
          </div>
          <div class="checkout-input-group" id="addressGroup" style="display:none;">
            <label for="checkoutAddress">Delivery Address</label>
            <input type="text" id="checkoutAddress" placeholder="e.g. House 12, Street 4, Fazilpur" />
          </div>
          <button class="checkout-whatsapp-btn" id="continueToWhatsApp">
            Continue to WhatsApp <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
